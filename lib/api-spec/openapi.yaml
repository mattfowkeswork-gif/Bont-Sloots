openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bont Sloots FC API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player management
  - name: fixtures
    description: Fixture management
  - name: awards
    description: MOM/MOTM awards
  - name: stats
    description: Goals & assists stats
  - name: admin
    description: Admin operations
  - name: dashboard
    description: Dashboard summary
  - name: seasons
    description: Season management
  - name: squad-stats
    description: Squad stats and leaderboard
  - name: motm
    description: MOTM voting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      responses:
        "200":
          description: Players list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get player profile with stats and award history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerProfile"
    put:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /players/{id}/comments:
    get:
      operationId: listPlayerComments
      tags: [players]
      summary: List all teammate comments for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerComment"
    post:
      operationId: addPlayerComment
      tags: [players]
      summary: Add a teammate comment for a player (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
              required:
                - comment
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerComment"

  /players/comments/{commentId}:
    delete:
      operationId: deletePlayerComment
      tags: [players]
      summary: Delete a teammate comment (admin only)
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /settings/{key}:
    get:
      operationId: getSetting
      tags: [settings]
      summary: Get a setting value
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Setting value
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  value:
                    type: string
                    nullable: true
                required:
                  - key
                  - value
    put:
      operationId: setSetting
      tags: [settings]
      summary: Set a setting value (admin only)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
              required:
                - value
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                  value:
                    type: string
                required:
                  - key
                  - value

  /fixtures:
    get:
      operationId: listFixtures
      tags: [fixtures]
      summary: List all fixtures
      responses:
        "200":
          description: Fixtures list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fixture"
    post:
      operationId: createFixture
      tags: [fixtures]
      summary: Create a fixture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFixtureBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fixture"

  /fixtures/{id}:
    get:
      operationId: getFixture
      tags: [fixtures]
      summary: Get fixture details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fixture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fixture"
    put:
      operationId: updateFixture
      tags: [fixtures]
      summary: Update a fixture (scores, KO time, TBC flag)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFixtureBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fixture"
    delete:
      operationId: deleteFixture
      tags: [fixtures]
      summary: Delete a fixture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List all seasons
      responses:
        "200":
          description: Seasons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"
    post:
      operationId: createSeason
      tags: [seasons]
      summary: Create a season
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeasonBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  /seasons/{id}:
    put:
      operationId: updateSeason
      tags: [seasons]
      summary: Update a season
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSeasonBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
    delete:
      operationId: deleteSeason
      tags: [seasons]
      summary: Delete a season
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: listStats
      tags: [stats]
      summary: Get goals and assists leaderboard
      parameters:
        - name: seasonId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Stats leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerStat"
    post:
      operationId: createStat
      tags: [stats]
      summary: Add a stat entry (goal or assist) for a player in a fixture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStatBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatEntry"

  /stats/{id}:
    delete:
      operationId: deleteStat
      tags: [stats]
      summary: Delete a stat entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /awards:
    get:
      operationId: listAwards
      tags: [awards]
      summary: List all awards (MOM and MOTM)
      responses:
        "200":
          description: Awards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Award"
    post:
      operationId: createAward
      tags: [awards]
      summary: Assign an award to a player for a fixture
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAwardBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Award"

  /awards/{id}:
    delete:
      operationId: deleteAward
      tags: [awards]
      summary: Delete an award
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary (next fixture, season record, top scorer)
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /squad-stats:
    get:
      operationId: getSquadStats
      tags: [squad-stats]
      summary: Get all players with aggregated stats and market value
      parameters:
        - name: seasonId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Squad stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SquadStatRow"

  /fixtures/bulk:
    post:
      operationId: bulkCreateFixtures
      tags: [fixtures]
      summary: Bulk create fixtures from a text list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateFixturesBody"
      responses:
        "201":
          description: Created fixtures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fixture"

  /fixtures/{id}/players:
    get:
      operationId: getFixturePlayers
      tags: [fixtures]
      summary: Get player presence list for a fixture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixturePlayerEntry"
    put:
      operationId: setFixturePlayers
      tags: [fixtures]
      summary: Set player presence for a fixture (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFixturePlayersBody"
      responses:
        "200":
          description: Updated presence list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixturePlayerEntry"

  /fixtures/{id}/ratings:
    get:
      operationId: getFixtureRatings
      tags: [fixtures]
      summary: Get match ratings for all players in a fixture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player ratings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerRatingEntry"
    put:
      operationId: setFixtureRatings
      tags: [fixtures]
      summary: Upsert match ratings for players in a fixture (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetFixtureRatingsBody"
      responses:
        "200":
          description: Saved ratings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerRatingEntry"

  /fixtures/{id}/vote-status:
    get:
      operationId: getVoteStatus
      tags: [motm]
      summary: Get MOTM voting status for a fixture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Voting status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteStatus"

  /fixtures/{id}/vote:
    post:
      operationId: castVote
      tags: [motm]
      summary: Cast an MOTM vote for a fixture
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CastVoteBody"
      responses:
        "201":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteStatus"
        "400":
          description: Voting closed or already voted
        "409":
          description: Already voted from this device

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResult"
        "401":
          description: Unauthorized

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Season:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isCurrent:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - startDate
        - endDate
        - isCurrent
        - createdAt

    CreateSeasonBody:
      type: object
      properties:
        name:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        isCurrent:
          type: boolean
      required:
        - name
        - startDate
        - endDate
        - isCurrent

    Player:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        position:
          type: string
          nullable: true
        scoutingProfile:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt

    PlayerComment:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - playerId
        - comment
        - createdAt

    PlayerProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        position:
          type: string
          nullable: true
        scoutingProfile:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        totalGoals:
          type: integer
        totalAssists:
          type: integer
        momCount:
          type: integer
        motmCount:
          type: integer
        apps:
          type: integer
        marketValue:
          type: integer
        recentForm:
          type: array
          items:
            type: integer
        comments:
          type: array
          items:
            $ref: "#/components/schemas/PlayerComment"
        awardHistory:
          type: array
          items:
            $ref: "#/components/schemas/Award"
      required:
        - id
        - name
        - createdAt
        - totalGoals
        - totalAssists
        - momCount
        - motmCount
        - apps
        - marketValue
        - recentForm
        - comments
        - awardHistory

    PlayerStat:
      type: object
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        totalGoals:
          type: integer
        totalAssists:
          type: integer
        momCount:
          type: integer
        motmCount:
          type: integer
      required:
        - playerId
        - playerName
        - totalGoals
        - totalAssists
        - momCount
        - motmCount

    CreatePlayerBody:
      type: object
      properties:
        name:
          type: string
        position:
          type: string
          nullable: true
        scoutingProfile:
          type: string
          nullable: true
      required:
        - name

    Fixture:
      type: object
      properties:
        id:
          type: integer
        opponent:
          type: string
        matchDate:
          type: string
          format: date
        kickoffTime:
          type: string
          nullable: true
        kickoffTbc:
          type: boolean
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        played:
          type: boolean
        isHome:
          type: boolean
        venue:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        seasonId:
          type: integer
          nullable: true
        votingClosesAt:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - opponent
        - matchDate
        - kickoffTbc
        - played
        - isHome

    CreateFixtureBody:
      type: object
      properties:
        opponent:
          type: string
        matchDate:
          type: string
          format: date
        kickoffTime:
          type: string
          nullable: true
        kickoffTbc:
          type: boolean
        isHome:
          type: boolean
        venue:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        seasonId:
          type: integer
          nullable: true
      required:
        - opponent
        - matchDate
        - kickoffTbc
        - isHome

    UpdateFixtureBody:
      type: object
      properties:
        opponent:
          type: string
        matchDate:
          type: string
          format: date
        kickoffTime:
          type: string
          nullable: true
        kickoffTbc:
          type: boolean
        homeScore:
          type: integer
          nullable: true
        awayScore:
          type: integer
          nullable: true
        played:
          type: boolean
        isHome:
          type: boolean
        venue:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        seasonId:
          type: integer
          nullable: true

    StatEntry:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: integer
        fixtureId:
          type: integer
        type:
          type: string
          enum: [goal, assist]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - playerId
        - fixtureId
        - type
        - createdAt

    CreateStatBody:
      type: object
      properties:
        playerId:
          type: integer
        fixtureId:
          type: integer
        type:
          type: string
          enum: [goal, assist]
      required:
        - playerId
        - fixtureId
        - type

    Award:
      type: object
      properties:
        id:
          type: integer
        playerId:
          type: integer
        playerName:
          type: string
        fixtureId:
          type: integer
        fixtureOpponent:
          type: string
        type:
          type: string
          enum: [mom, motm]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - playerId
        - playerName
        - fixtureId
        - fixtureOpponent
        - type
        - createdAt

    CreateAwardBody:
      type: object
      properties:
        playerId:
          type: integer
        fixtureId:
          type: integer
        type:
          type: string
          enum: [mom, motm]
      required:
        - playerId
        - fixtureId
        - type

    HallOfFame:
      type: object
      properties:
        topScorer:
          type: object
          nullable: true
          properties:
            playerId:
              type: integer
            playerName:
              type: string
            value:
              type: integer
          required:
            - playerId
            - playerName
            - value
        mostMotms:
          type: object
          nullable: true
          properties:
            playerId:
              type: integer
            playerName:
              type: string
            value:
              type: integer
          required:
            - playerId
            - playerName
            - value
        muppetKing:
          type: object
          nullable: true
          properties:
            playerId:
              type: integer
            playerName:
              type: string
            value:
              type: integer
          required:
            - playerId
            - playerName
            - value
      required:
        - topScorer
        - mostMotms
        - muppetKing

    Dashboard:
      type: object
      properties:
        nextFixture:
          $ref: "#/components/schemas/Fixture"
          nullable: true
        seasonRecord:
          type: object
          properties:
            played:
              type: integer
            wins:
              type: integer
            draws:
              type: integer
            losses:
              type: integer
            goalsFor:
              type: integer
            goalsAgainst:
              type: integer
          required:
            - played
            - wins
            - draws
            - losses
            - goalsFor
            - goalsAgainst
        topScorer:
          $ref: "#/components/schemas/PlayerStat"
          nullable: true
        recentResults:
          type: array
          items:
            $ref: "#/components/schemas/Fixture"
        hallOfFame:
          $ref: "#/components/schemas/HallOfFame"
        squadPhotoUrl:
          type: string
          nullable: true
      required:
        - seasonRecord
        - recentResults
        - hallOfFame

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    AdminLoginResult:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
          nullable: true
      required:
        - success

    SquadStatRow:
      type: object
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        position:
          type: string
          nullable: true
        scoutingProfile:
          type: string
          nullable: true
        apps:
          type: integer
        goals:
          type: integer
        assists:
          type: integer
        motmVotes:
          type: integer
        muppetAwards:
          type: integer
        marketValue:
          type: integer
        recentForm:
          type: array
          items:
            type: integer
          description: Market value delta for last 3 appearances (oldest to newest)
      required:
        - playerId
        - playerName
        - apps
        - goals
        - assists
        - motmVotes
        - muppetAwards
        - marketValue
        - recentForm

    FixturePlayerEntry:
      type: object
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        present:
          type: boolean
      required:
        - playerId
        - playerName
        - present

    SetFixturePlayersBody:
      type: object
      properties:
        playerIds:
          type: array
          items:
            type: integer
          description: IDs of players who were present
      required:
        - playerIds

    PlayerRatingEntry:
      type: object
      properties:
        playerId:
          type: integer
        playerName:
          type: string
        rating:
          type: number
          nullable: true
          description: Rating from 0.0 to 10.0 in 0.5 increments, or null if not yet rated
      required:
        - playerId
        - playerName
        - rating

    SetFixtureRatingsBody:
      type: object
      properties:
        ratings:
          type: array
          items:
            type: object
            properties:
              playerId:
                type: integer
              rating:
                type: number
                description: 0.0 to 10.0 in 0.5 increments
            required:
              - playerId
              - rating
      required:
        - ratings

    BulkCreateFixturesBody:
      type: object
      properties:
        text:
          type: string
          description: Newline-separated fixture text, e.g. "12/04 vs Real Sosobad"
        seasonId:
          type: integer
          nullable: true
        defaultYear:
          type: integer
          nullable: true
      required:
        - text

    VoteStatus:
      type: object
      properties:
        isOpen:
          type: boolean
        votingClosesAt:
          type: string
          format: date-time
          nullable: true
        hasVoted:
          type: boolean
        eligiblePlayers:
          type: array
          items:
            $ref: "#/components/schemas/FixturePlayerEntry"
        results:
          type: array
          items:
            type: object
            properties:
              playerId:
                type: integer
              playerName:
                type: string
              votes:
                type: integer
            required:
              - playerId
              - playerName
              - votes
      required:
        - isOpen
        - hasVoted
        - eligiblePlayers
        - results

    CastVoteBody:
      type: object
      properties:
        playerId:
          type: integer
        deviceId:
          type: string
      required:
        - playerId
        - deviceId
