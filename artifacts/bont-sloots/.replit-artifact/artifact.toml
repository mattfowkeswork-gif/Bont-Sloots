kind = "web"
previewPath = "/"
title = "Bont Sloots FC"
version = "1.0.0"
id = "artifacts/bont-sloots"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22578

[services.development]
run = "pnpm --filter @workspace/bont-sloots run dev"

[services.production]
publicDir = "artifacts/bont-sloots/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/bont-sloots", "run", "build"]

[services.production.build.env]
PORT = "3000"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22578"
BASE_PATH = "/"
